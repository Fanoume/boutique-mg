<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fanoumé · Soins et Bien-être</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#fdf9f9;color:#1a1a18;font-size:14px}

/* Header fond rose identique au logo */
header{background:#fdf0f3;border-bottom:1px solid #f0dde0;padding:0;position:sticky;top:0;z-index:100;box-shadow:0 2px 10px rgba(192,48,90,.08)}
.header-inner{max-width:1100px;margin:0 auto;padding:8px 20px;display:flex;align-items:center;justify-content:space-between;gap:12px}

/* Logo à gauche, grand */
.logo-wrap img{height:160px;object-fit:contain;display:block}

/* Droite : langue + panier */
.header-right{display:flex;align-items:center;gap:10px}
.lang-btn{display:flex;gap:4px}
.lang-btn button{padding:5px 11px;font-size:11px;font-weight:700;border:1.5px solid #e0b0c0;border-radius:20px;cursor:pointer;background:transparent;color:#c0305a;font-family:inherit;transition:.15s}
.lang-btn button.active{background:#c0305a;color:#fff;border-color:#c0305a}
.cart-btn{background:#c0305a;color:#fff;border:none;border-radius:10px;padding:9px 16px;font-size:13px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:6px;font-family:inherit;white-space:nowrap}
.cart-btn:hover{background:#a0284a}

/* Hero ROSE comme la première version */
.hero{background:linear-gradient(135deg,#fdf0f3 0%,#fce4ec 100%);border-bottom:1px solid #f0dde0;padding:36px 20px;text-align:center}
.hero h2{font-size:26px;font-weight:800;margin-bottom:8px;color:#c0305a}
.hero p{color:#c0305a;font-size:13px;font-weight:500}

.container{max-width:1100px;margin:0 auto;padding:20px 16px}
.cats{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px}
.cat-btn{padding:7px 16px;border:1.5px solid #e8c0ca;border-radius:20px;font-size:12px;cursor:pointer;background:#fff;font-family:inherit;font-weight:600;color:#c0305a;transition:.15s}
.cat-btn:hover,.cat-btn.active{background:#c0305a;color:#fff;border-color:#c0305a}
.prod-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:16px;margin-bottom:32px}
@media(max-width:480px){.prod-grid{grid-template-columns:repeat(2,1fr);gap:10px}}
.prod-card{background:#fff;border-radius:16px;overflow:hidden;box-shadow:0 2px 8px rgba(192,48,90,.07);transition:.2s;border:1px solid #fae8ec}
.prod-card:hover{box-shadow:0 8px 24px rgba(192,48,90,.13);transform:translateY(-2px)}
.prod-card.out{opacity:.6}
.prod-img{width:100%;height:160px;object-fit:cover;background:#fdf0f3;display:flex;align-items:center;justify-content:center;font-size:48px}
.prod-img img{width:100%;height:160px;object-fit:cover}
.prod-body{padding:12px}
.prod-nom{font-weight:700;font-size:13px;margin-bottom:4px}
.prod-prix{font-size:16px;font-weight:800;color:#c0305a;margin-bottom:6px}
.badge-ok{background:#E1F5EE;color:#0F6E56;padding:2px 8px;border-radius:12px;font-size:11px;font-weight:600;display:inline-block}
.badge-low{background:#FAEEDA;color:#854F0B;padding:2px 8px;border-radius:12px;font-size:11px;font-weight:600;display:inline-block}
.badge-out{background:#FAECE7;color:#993C1D;padding:2px 8px;border-radius:12px;font-size:11px;font-weight:600;display:inline-block}
.add-btn{width:100%;padding:9px;background:#c0305a;color:#fff;border:none;border-radius:10px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;margin-top:8px;transition:.15s}
.add-btn:hover{background:#a0284a}
.add-btn:disabled{background:#ddd;cursor:default;color:#999}
.qty-ctrl{display:flex;align-items:center;gap:8px;margin-top:8px}
.qty-ctrl button{width:30px;height:30px;border:1.5px solid #e8c0ca;border-radius:8px;background:#fff;font-size:16px;cursor:pointer;color:#c0305a;font-weight:700;display:flex;align-items:center;justify-content:center}
.qty-ctrl button:hover{background:#fdf0f3}
.qty-ctrl span{flex:1;text-align:center;font-weight:700;font-size:15px;color:#c0305a}

/* Drawer */
.drawer-bg{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:200;display:none;opacity:0;transition:.25s}
.drawer-bg.open{display:block;opacity:1}
.drawer{position:fixed;right:0;top:0;bottom:0;width:min(400px,100vw);background:#fff;z-index:201;transform:translateX(100%);transition:.3s;display:flex;flex-direction:column;box-shadow:-4px 0 24px rgba(192,48,90,.12)}
.drawer.open{transform:translateX(0)}
.drawer-header{padding:16px 20px;border-bottom:1px solid #fae8ec;display:flex;align-items:center;justify-content:space-between;background:#fdf0f3}
.drawer-header h3{font-size:16px;font-weight:700;color:#c0305a}
.drawer-close{background:none;border:none;font-size:24px;cursor:pointer;color:#888}
.drawer-body{flex:1;overflow-y:auto;padding:16px 20px}
.cart-item{display:flex;gap:12px;padding:12px 0;border-bottom:1px solid #fae8ec}
.cart-item:last-child{border-bottom:none}
.cart-item-img{width:56px;height:56px;border-radius:10px;object-fit:cover;background:#fdf0f3;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:24px;overflow:hidden}
.cart-item-img img{width:56px;height:56px;object-fit:cover}
.cart-item-info{flex:1}
.cart-item-nom{font-weight:700;font-size:13px;margin-bottom:3px}
.cart-item-prix{font-size:12px;color:#888;margin-bottom:6px}
.cart-item-ctrl{display:flex;align-items:center;gap:6px}
.ci-btn{width:26px;height:26px;border:1px solid #e8c0ca;border-radius:6px;background:#fff;cursor:pointer;font-size:14px;color:#c0305a;font-weight:700;display:flex;align-items:center;justify-content:center}
.ci-btn:hover{background:#fdf0f3}
.cart-item-del{margin-left:auto;background:none;border:none;color:#D85A30;cursor:pointer;font-size:18px}
.drawer-footer{padding:16px 20px;border-top:1px solid #fae8ec;background:#fdf9f9}
.cart-total{display:flex;justify-content:space-between;font-size:16px;font-weight:800;margin-bottom:14px}
.checkout-btn{width:100%;padding:13px;background:#c0305a;color:#fff;border:none;border-radius:12px;font-size:14px;font-weight:800;cursor:pointer;font-family:inherit}
.checkout-btn:hover{background:#a0284a}
.empty-cart{text-align:center;padding:40px 20px;color:#aaa;font-size:13px}

/* Modal */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:300;display:none;align-items:center;justify-content:center;padding:16px}
.modal-bg.open{display:flex}
.modal{background:#fff;border-radius:20px;padding:24px;width:100%;max-width:460px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(192,48,90,.15)}
.modal h3{font-size:17px;font-weight:800;margin-bottom:4px;color:#c0305a}
.modal p{font-size:13px;color:#888;margin-bottom:18px}
.form-group{margin-bottom:12px}
.form-group label{font-size:12px;color:#666;display:block;margin-bottom:4px;font-weight:600}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:10px 12px;font-size:13px;border:1.5px solid #e8c0ca;border-radius:10px;font-family:inherit}
.form-group input:focus,.form-group select:focus{outline:none;border-color:#c0305a}
.form-group textarea{height:65px;resize:none}
.modal-actions{display:flex;gap:10px;margin-top:18px}
.modal-actions button{flex:1;padding:12px;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit}
.btn-cancel{background:#f5f4f0;border:1px solid #ddd;color:#666}
.btn-confirm{background:#c0305a;border:none;color:#fff}
.btn-confirm:hover{background:#a0284a}
.order-summary{background:#fdf0f3;border-radius:10px;padding:12px;margin-bottom:14px;font-size:13px}
.order-summary .row{display:flex;justify-content:space-between;padding:3px 0;color:#666}
.order-summary .total{font-weight:800;font-size:15px;border-top:1px solid #f0dde0;margin-top:6px;padding-top:6px;color:#c0305a}
.payment-box{background:#fdf0f3;border:1.5px solid #f0c0cc;border-radius:10px;padding:12px;font-size:13px;color:#c0305a;margin-bottom:12px}
.payment-box b{display:block;margin-bottom:4px}
.success-modal{text-align:center;padding:8px 0}
.success-icon{font-size:60px;margin-bottom:12px}
.ref-box{background:#fdf0f3;border-radius:10px;padding:12px;margin:10px 0;font-family:monospace;font-size:18px;font-weight:800;color:#c0305a;letter-spacing:2px}
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <!-- Logo à gauche, grand, fond fondu -->
    <div class="logo-wrap">
      <img src="https://oxibglwyiygdruummwqq.supabase.co/storage/v1/object/public/photos/fanoume-logo.png"
           alt="Fanoumé" onerror="this.style.display='none'" />
    </div>
    <!-- Droite : langue + panier -->
    <div class="header-right">
      <div class="lang-btn">
        <button id="btn-fr" class="active" onclick="setLang('fr')">FR</button>
        <button id="btn-mg" onclick="setLang('mg')">MG</button>
      </div>
      <button class="cart-btn" onclick="openCart()">
        🛒 <span id="cart-label">Panier</span>
        <span id="cart-count" style="background:#fff;color:#c0305a;border-radius:12px;padding:1px 7px;font-size:12px">0</span>
      </button>
    </div>
  </div>
</header>

<!-- Hero ROSE -->
<div class="hero">
  <h2>🛍️ Nos Produits</h2>
  <p id="hero-sub">Livraison à domicile ou retrait en main propre · Paiement MVola / Orange Money</p>
</div>

<div class="container">
  <div class="cats" id="cats"></div>
  <div class="prod-grid" id="prod-grid">
    <div style="color:#aaa;font-size:13px;grid-column:1/-1">Chargement...</div>
  </div>
</div>

<div class="drawer-bg" id="drawer-bg" onclick="closeCart()"></div>
<div class="drawer" id="drawer">
  <div class="drawer-header">
    <h3 id="drawer-title">🛒 Mon panier</h3>
    <button class="drawer-close" onclick="closeCart()">×</button>
  </div>
  <div class="drawer-body" id="drawer-body"></div>
  <div class="drawer-footer" id="drawer-footer" style="display:none">
    <div class="cart-total"><span id="total-label">Total</span><span id="cart-total-val"></span></div>
    <button class="checkout-btn" id="cmd-btn" onclick="openCheckout()">Commander →</button>
  </div>
</div>

<div class="modal-bg" id="checkout-modal">
  <div class="modal"><div id="modal-content"></div></div>
</div>

<script>
const SB_URL='https://oxibglwyiygdruummwqq.supabase.co';
const SB_KEY='sb_publishable_OD48fjY3xSdDmEiM9xMvAg_zcQsyvkB';
const H={'Content-Type':'application/json','apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Prefer':'return=representation'};
const MVOLA='038 71 867 42';
const ORANGE='032 XX XXX XX'; // ← Mettez votre numéro Orange Money
const AIRTEL='033 XX XXX XX'; // ← Mettez votre numéro Airtel Money
const SHOP='Fanoumé';
let produits=[],panier=[],currentCat='Tous',lang='fr';

const T={
  fr:{
    tous:'Tous',panier:'Panier',commander:'Commander →',total:'Total',
    enStock:'En stock',stockLimite:'Stock limité',rupture:'Rupture',
    ajouter:'+ Ajouter',indisponible:'Indisponible',
    drawerTitle:'🛒 Mon panier',panierVide:'Votre panier est vide.',
    votreCom:'📋 Votre commande',remplissez:'Remplissez vos informations pour confirmer',
    nom:'Votre nom complet *',tel:'Numéro de téléphone *',
    livraison:'Mode de livraison *',domicile:'Livraison à domicile',retrait:'Retrait en main propre',
    adresse:'Adresse de livraison *',paiement:'Mode de paiement *',
    notes:'Notes (facultatif)',instructions:'Instructions spéciales...',
    annuler:'Annuler',confirmer:'✓ Confirmer la commande',
    traitement:'⏳ Traitement...',confirme:'Commande confirmée !',
    merci:'Merci',enregistree:'votre commande a bien été enregistrée.',
    reference:'Référence',totalPayer:'Total à payer',modeL:'Livraison',modeP:'Paiement',
    noubliez:"🔔 N'oubliez pas :",envoyez:'Envoyez',via:'via MVola au',
    capture:'Envoyez au vendeur : 1️⃣ la capture d\'écran de votre commande + 2️⃣ la capture du paiement effectué. Les frais de retrait Mobile Money sont à votre charge.',
    fermer:'Fermer',
    heroSub:'Livraison à domicile ou retrait en main propre · Paiement MVola / Orange Money',
    adressePH:'Quartier, rue, numéro...',telPH:'ex: 034 XX XXX XX',
  },
  mg:{
    tous:'Rehetra',panier:'Harona',commander:'Manao baiko →',total:'Totaliny',
    enStock:'Misy',stockLimite:'Vitsy sisa',rupture:'Lany',
    ajouter:'+ Atao ao',indisponible:'Tsy misy',
    drawerTitle:'🛒 Ny haronako',panierVide:'Foana ny harona.',
    votreCom:'📋 Ny baiko azonao',remplissez:'Fenoy ny mombamomba anao',
    nom:'Anaranao feno *',tel:'Nomerao telefaonina *',
    livraison:'Fomba fandefasana *',domicile:'Alefa any an-trano',retrait:'Alaina eto aminay',
    adresse:'Adiresy fandefasana *',paiement:'Fomba fandoavana *',
    notes:'Fanamarihana (tsy voatery)',instructions:'Torohevitra manokana...',
    annuler:'Hanafoana',confirmer:'✓ Manamarina ny baiko',
    traitement:'⏳ Miandry...',confirme:'Voamarina ny baiko !',
    merci:'Misaotra',enregistree:'voasoratra tsara ny baiko.',
    reference:'Laharana',totalPayer:'Totaliny aloa',modeL:'Fandefasana',modeP:'Fandoavana',
    noubliez:'🔔 Aza adino :',envoyez:'Alefa',via:'amin\'ny MVola amin\'ny',
    capture:'Alefa amin\'ny mpamidy : 1️⃣ sary ny baiko + 2️⃣ sary ny fandoavana. Ny sara fandovana Mobile Money dia anao.',
    fermer:'Hidio',
    heroSub:'Alefa any an-trano na alaina eto · Fandoavana MVola / Orange Money',
    adressePH:'Faritra, lalana, nomerao...',telPH:'ohatra: 034 XX XXX XX',
  }
};

function t(k){return T[lang][k]||k;}
function fAr(n){return Math.round(n||0).toLocaleString('fr-FR')+' Ar';}

function setLang(l){
  lang=l;
  document.getElementById('btn-fr').classList.toggle('active',l==='fr');
  document.getElementById('btn-mg').classList.toggle('active',l==='mg');
  document.getElementById('hero-sub').textContent=t('heroSub');
  document.getElementById('cart-label').textContent=t('panier');
  document.getElementById('drawer-title').textContent=t('drawerTitle');
  document.getElementById('cmd-btn').textContent=t('commander');
  document.getElementById('total-label').textContent=t('total');
  renderCats();renderProduits();renderDrawer();
}

async function sb(path,method='GET',body=null){
  const opts={method,headers:H};
  if(body)opts.body=JSON.stringify(body);
  const r=await fetch(SB_URL+'/rest/v1/'+path,opts);
  if(!r.ok)throw new Error(await r.text());
  const tx=await r.text();return tx?JSON.parse(tx):null;
}

async function loadProduits(){
  try{produits=(await sb('produits?select=*&order=nom'))||[];renderCats();renderProduits();}
  catch(e){document.getElementById('prod-grid').innerHTML='<p style="color:#D85A30;font-size:13px;grid-column:1/-1">Erreur de chargement.</p>';}
}

function renderCats(){
  const cats=['Tous',...new Set(produits.map(p=>p.cat).filter(Boolean))];
  document.getElementById('cats').innerHTML=cats.map(c=>
    `<button class="cat-btn ${c===currentCat?'active':''}" onclick="filterCat('${c}')">${c==='Tous'?t('tous'):c}</button>`
  ).join('');
}

function filterCat(cat){currentCat=cat;renderCats();renderProduits();}

function renderProduits(){
  const list=(currentCat==='Tous'?produits:produits.filter(p=>p.cat===currentCat)).filter(p=>p.prix_vente);
  if(!list.length){document.getElementById('prod-grid').innerHTML='<p style="color:#aaa;font-size:13px;grid-column:1/-1">Aucun produit disponible.</p>';return;}
  document.getElementById('prod-grid').innerHTML=list.map(p=>{
    const enPanier=panier.find(x=>x.prod.id===p.id);
    const rupture=p.stk<=0;
    const imgHtml=p.photo?`<img src="${p.photo}" alt="${p.nom}" onerror="this.parentElement.innerHTML='🌸'">`:'🌸';
    const stockBadge=rupture?`<span class="badge-out">${t('rupture')}</span>`:p.stk<=p.seuil?`<span class="badge-low">${t('stockLimite')} (${p.stk})</span>`:`<span class="badge-ok">${t('enStock')}</span>`;
    const btnHtml=rupture?`<button class="add-btn" disabled>${t('indisponible')}</button>`:
      enPanier?`<div class="qty-ctrl"><button onclick="changeQte('${p.id}',-1)">−</button><span>${enPanier.qte}</span><button onclick="changeQte('${p.id}',1)">+</button></div>`:
      `<button class="add-btn" onclick="addToCart('${p.id}')">${t('ajouter')}</button>`;
    return `<div class="prod-card ${rupture?'out':''}"><div class="prod-img">${imgHtml}</div><div class="prod-body"><div class="prod-nom">${p.nom}</div><div style="margin-bottom:6px">${p.prix_barre>0?`<span style="text-decoration:line-through;color:#aaa;font-size:12px;margin-right:6px">${fAr(p.prix_barre)}</span>`:''}<span class="prod-prix" style="display:inline">${fAr(p.prix_vente)}</span>${p.prix_barre>0?`<span style="background:#c0305a;color:#fff;font-size:10px;font-weight:700;padding:2px 6px;border-radius:8px;margin-left:4px">-${Math.round((1-p.prix_vente/p.prix_barre)*100)}%</span>`:''}</div><div style="margin-bottom:8px">${stockBadge}</div>${btnHtml}</div></div>`;
  }).join('');
}

function addToCart(id){
  const p=produits.find(x=>x.id===id);if(!p||p.stk<=0)return;
  const ex=panier.find(x=>x.prod.id===id);
  if(ex){if(ex.qte<p.stk)ex.qte++;}else panier.push({prod:p,qte:1});
  updateCartCount();renderProduits();
}
function changeQte(id,delta){
  const idx=panier.findIndex(x=>x.prod.id===id);if(idx===-1)return;
  panier[idx].qte+=delta;
  if(panier[idx].qte<=0)panier.splice(idx,1);
  else{const p=produits.find(x=>x.id===id);if(p&&panier[idx].qte>p.stk)panier[idx].qte=p.stk;}
  updateCartCount();renderProduits();renderDrawer();
}
function updateCartCount(){document.getElementById('cart-count').textContent=panier.reduce((s,x)=>s+x.qte,0);}
function openCart(){renderDrawer();document.getElementById('drawer-bg').classList.add('open');document.getElementById('drawer').classList.add('open');}
function closeCart(){document.getElementById('drawer-bg').classList.remove('open');document.getElementById('drawer').classList.remove('open');}

function renderDrawer(){
  const body=document.getElementById('drawer-body'),footer=document.getElementById('drawer-footer');
  if(!panier.length){body.innerHTML=`<div class="empty-cart">🛍️<br><br>${t('panierVide')}</div>`;footer.style.display='none';return;}
  const total=panier.reduce((s,x)=>s+(x.prod.prix_vente||0)*x.qte,0);
  body.innerHTML=panier.map(item=>`<div class="cart-item"><div class="cart-item-img">${item.prod.photo?`<img src="${item.prod.photo}">`:'🌸'}</div><div class="cart-item-info"><div class="cart-item-nom">${item.prod.nom}</div><div class="cart-item-prix">${fAr(item.prod.prix_vente||0)} × ${item.qte} = <b>${fAr((item.prod.prix_vente||0)*item.qte)}</b></div><div class="cart-item-ctrl"><button class="ci-btn" onclick="changeQte('${item.prod.id}',-1)">−</button><span style="font-weight:700;min-width:24px;text-align:center;color:#c0305a">${item.qte}</span><button class="ci-btn" onclick="changeQte('${item.prod.id}',1)">+</button><button class="cart-item-del" onclick="removeFromCart('${item.prod.id}')">🗑</button></div></div></div>`).join('');
  document.getElementById('cart-total-val').textContent=fAr(total);
  footer.style.display='block';
}
function removeFromCart(id){panier=panier.filter(x=>x.prod.id!==id);updateCartCount();renderDrawer();renderProduits();}

function openCheckout(){
  closeCart();
  const total=panier.reduce((s,x)=>s+(x.prod.prix_vente||0)*x.qte,0);
  const summaryRows=panier.map(item=>`<div class="row"><span>${item.prod.nom} ×${item.qte}</span><span>${fAr((item.prod.prix_vente||0)*item.qte)}</span></div>`).join('');
  document.getElementById('modal-content').innerHTML=`
    <h3>${t('votreCom')}</h3><p>${t('remplissez')}</p>
    <div class="order-summary">${summaryRows}<div class="row total"><span>${t('totalPayer')}</span><span>${fAr(total)}</span></div></div>
    <div class="form-group"><label>${t('nom')}</label><input id="o-nom" placeholder="ex: Rakoto Marie" /></div>
    <div class="form-group"><label>${t('tel')}</label><input id="o-tel" type="tel" placeholder="${t('telPH')}" /></div>
    <div class="form-group"><label>${t('livraison')}</label><select id="o-livraison" onchange="toggleAdresse()"><option value="domicile">${t('domicile')}</option><option value="retrait">${t('retrait')}</option></select></div>
    <div class="form-group" id="adresse-group"><label>${t('adresse')}</label><textarea id="o-adresse" placeholder="${t('adressePH')}"></textarea></div>
    <div class="form-group"><label>${t('paiement')}</label><select id="o-paiement" onchange="updatePaymentInfo(${total})"><option value="mvola">MVola</option><option value="orange">Orange Money</option><option value="airtel">Airtel Money</option></select></div>
    <div class="payment-box" id="payment-info"><b>${t('envoyez')} ${fAr(total)} ${t('via')} ${MVOLA}</b>Nom : <b>${SHOP}</b><br><small>${t('capture')}</small></div>
    <div class="form-group"><label>${t('notes')}</label><input id="o-notes" placeholder="${t('instructions')}" /></div>
    <div class="modal-actions"><button class="btn-cancel" onclick="closeCheckout()">${t('annuler')}</button><button class="btn-confirm" onclick="confirmOrder(${total})">${t('confirmer')}</button></div>`;
  document.getElementById('checkout-modal').classList.add('open');
}
function toggleAdresse(){document.getElementById('adresse-group').style.display=document.getElementById('o-livraison').value==='domicile'?'block':'none';}
function updatePaymentInfo(total){
  const mode=document.getElementById('o-paiement').value;
  const num=mode==='mvola'?MVOLA:mode==='orange'?ORANGE:AIRTEL;
  const label=mode==='mvola'?'MVola':mode==='orange'?'Orange Money':'Airtel Money';
  document.getElementById('payment-info').innerHTML=`<b>${t('envoyez')} ${fAr(total)} via ${label} au ${num}</b>Nom : <b>${SHOP}</b><br><small>${t('capture')}</small>`;
}
function closeCheckout(){document.getElementById('checkout-modal').classList.remove('open');}

async function confirmOrder(total){
  const nom=document.getElementById('o-nom').value.trim();
  const tel=document.getElementById('o-tel').value.trim();
  const livraison=document.getElementById('o-livraison').value;
  const adresse=document.getElementById('o-adresse')?.value?.trim()||'';
  const paiement=document.getElementById('o-paiement').value;
  const notes=document.getElementById('o-notes').value.trim();
  if(!nom||!tel){alert('Nom et téléphone requis');return;}
  if(livraison==='domicile'&&!adresse){alert('Adresse requise');return;}
  const btn=document.querySelector('.btn-confirm');
  btn.textContent=t('traitement');btn.disabled=true;
  const today=new Date().toISOString().split('T')[0];
  const ref='CMD-'+Date.now();
  try{
    for(const item of panier){
      await fetch(SB_URL+'/rest/v1/ventes',{method:'POST',headers:H,body:JSON.stringify({id:'V'+Date.now()+Math.random().toString(36).slice(2,6),pid:item.prod.id,qte:item.qte,pu:item.prod.prix_vente||0,date:today,cli:nom+' ('+tel+')',rem:`${livraison}|${paiement}|${adresse}|${notes}`,ref_commande:ref})});
      await fetch(SB_URL+'/rest/v1/produits?id=eq.'+item.prod.id,{method:'PATCH',headers:H,body:JSON.stringify({stk:Math.max(0,item.prod.stk-item.qte)})});
    }
    document.getElementById('modal-content').innerHTML=`<div class="success-modal"><div class="success-icon">🎉</div><h3 style="color:#c0305a;font-size:20px;margin-bottom:8px">${t('confirme')}</h3><p style="color:#666;margin-bottom:14px">${t('merci')} <b>${nom}</b>, ${t('enregistree')}</p><div class="ref-box">${ref}</div><div class="order-summary" style="text-align:left;margin-top:12px"><div class="row"><span>${t('reference')}</span><span><b>${ref}</b></span></div><div class="row"><span>${t('totalPayer')}</span><span><b>${fAr(total)}</b></span></div><div class="row"><span>${t('modeL')}</span><span>${livraison==='domicile'?t('domicile'):t('retrait')}</span></div><div class="row"><span>${t('modeP')}</span><span>${paiement==='mvola'?'MVola':paiement==='orange'?'Orange Money':'Airtel Money'}</span></div></div><div class="payment-box" style="text-align:left;margin-top:12px"><b>${t('noubliez')}</b>${t('envoyez')} <b>${fAr(total)}</b> ${t('via')} <b>${MVOLA}</b><br>Nom : <b>${SHOP}</b><br><small>${t('capture')}</small></div><button class="checkout-btn" style="margin-top:16px" onclick="closeCheckout();location.reload()">${t('fermer')}</button></div>`;
    panier=[];updateCartCount();
  }catch(e){btn.textContent=t('confirmer');btn.disabled=false;alert('Erreur: '+e.message);}
}

loadProduits();
setInterval(loadProduits,30000);
</script>
</body>
</html>
